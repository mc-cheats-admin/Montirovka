name: autoedit

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoedit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-autoedit} -d ${POSTGRES_DB:-autoedit}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - autoedit

  redis:
    image: redis:7-alpine
    container_name: autoedit-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - autoedit

  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim

        ENV PYTHONDONTWRITEBYTECODE=1
        ENV PYTHONUNBUFFERED=1
        ENV PIP_NO_CACHE_DIR=1

        RUN apt-get update && apt-get install -y --no-install-recommends \
            bash \
            build-essential \
            curl \
            ffmpeg \
            sox \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libgomp1 \
            libsndfile1 \
            libmagic1 \
            postgresql-client \
            && rm -rf /var/lib/apt/lists/*

        WORKDIR /app/backend

        COPY backend/requirements.txt /tmp/requirements.txt
        RUN pip install --upgrade pip && pip install -r /tmp/requirements.txt

        COPY backend /app/backend
      tags:
        - autoedit-backend:local
    image: autoedit-backend:local
    container_name: autoedit-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-AutoEdit}
      APP_ENV: ${APP_ENV:-development}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://autoedit:autoedit@postgres:5432/autoedit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_MODE: ${STORAGE_MODE:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-/data/storage}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-minioadmin}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-autoedit}
      STORAGE_S3_SECURE: ${STORAGE_S3_SECURE:-false}
      UPLOAD_MAX_SIZE_BYTES: ${UPLOAD_MAX_SIZE_BYTES:-2147483648}
      ALLOWED_VIDEO_EXTENSIONS: ${ALLOWED_VIDEO_EXTENSIONS:-.mp4,.mov,.avi,.mkv}
      TEMP_DIR: ${TEMP_DIR:-/data/tmp}
      OUTPUT_DIR: ${OUTPUT_DIR:-/data/output}
      PREVIEW_DIR: ${PREVIEW_DIR:-/data/previews}
      MODELS_DIR: ${MODELS_DIR:-/data/models}
      FFMPEG_BINARY: ${FFMPEG_BINARY:-ffmpeg}
      FFPROBE_BINARY: ${FFPROBE_BINARY:-ffprobe}
      SOX_BINARY: ${SOX_BINARY:-sox}
      RNNOISE_BINARY: ${RNNOISE_BINARY:-/usr/local/bin/rnnoise_demo}
      RIFE_BINARY: ${RIFE_BINARY:-python}
      RIFE_SCRIPT: ${RIFE_SCRIPT:-/opt/models/rife/inference_video.py}
      REALESRGAN_BINARY: ${REALESRGAN_BINARY:-/usr/local/bin/realesrgan-ncnn-vulkan}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      ENABLE_GPU: ${ENABLE_GPU:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JOB_RETENTION_HOURS: ${JOB_RETENTION_HOURS:-48}
      WEBSOCKET_PING_INTERVAL: ${WEBSOCKET_PING_INTERVAL:-20}
      PRESET_DIR: ${PRESET_DIR:-/app/backend/app/presets}
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /data/storage /data/tmp /data/output /data/previews /data/models && \
        alembic upgrade head && \
        uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000}
    volumes:
      - ./data/storage:/data/storage
      - ./data/tmp:/data/tmp
      - ./data/output:/data/output
      - ./data/previews:/data/previews
      - ./data/models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-8000}/api/v1/health', timeout=5).read()\""
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - autoedit

  worker:
    image: autoedit-backend:local
    container_name: autoedit-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME:-AutoEdit}
      APP_ENV: ${APP_ENV:-development}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-autoedit}
      POSTGRES_USER: ${POSTGRES_USER:-autoedit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoedit}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://autoedit:autoedit@postgres:5432/autoedit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_MODE: ${STORAGE_MODE:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-/data/storage}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_ACCESS_KEY: ${STORAGE_S3_ACCESS_KEY:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${STORAGE_S3_SECRET_KEY:-minioadmin}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-autoedit}
      STORAGE_S3_SECURE: ${STORAGE_S3_SECURE:-false}
      UPLOAD_MAX_SIZE_BYTES: ${UPLOAD_MAX_SIZE_BYTES:-2147483648}
      ALLOWED_VIDEO_EXTENSIONS: ${ALLOWED_VIDEO_EXTENSIONS:-.mp4,.mov,.avi,.mkv}
      TEMP_DIR: ${TEMP_DIR:-/data/tmp}
      OUTPUT_DIR: ${OUTPUT_DIR:-/data/output}
      PREVIEW_DIR: ${PREVIEW_DIR:-/data/previews}
      MODELS_DIR: ${MODELS_DIR:-/data/models}
      FFMPEG_BINARY: ${FFMPEG_BINARY:-ffmpeg}
      FFPROBE_BINARY: ${FFPROBE_BINARY:-ffprobe}
      SOX_BINARY: ${SOX_BINARY:-sox}
      RNNOISE_BINARY: ${RNNOISE_BINARY:-/usr/local/bin/rnnoise_demo}
      RIFE_BINARY: ${RIFE_BINARY:-python}
      RIFE_SCRIPT: ${RIFE_SCRIPT:-/opt/models/rife/inference_video.py}
      REALESRGAN_BINARY: ${REALESRGAN_BINARY:-/usr/local/bin/realesrgan-ncnn-vulkan}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      ENABLE_GPU: ${ENABLE_GPU:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JOB_RETENTION_HOURS: ${JOB_RETENTION_HOURS:-48}
      WEBSOCKET_PING_INTERVAL: ${WEBSOCKET_PING_INTERVAL:-20}
      PRESET_DIR: ${PRESET_DIR:-/app/backend/app/presets}
    working_dir: /app/backend
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /data/storage /data/tmp /data/output /data/previews /data/models && \
        celery -A app.workers.celery_app:celery_app worker --loglevel=${LOG_LEVEL:-INFO} --pool=solo -Q video_jobs,maintenance
    volumes:
      - ./data/storage:/data/storage
      - ./data/tmp:/data/tmp
      - ./data/output:/data/output
      - ./data/previews:/data/previews
      - ./data/models:/data/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - autoedit

  frontend:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine

        ENV NODE_ENV=production

        WORKDIR /app/frontend

        COPY frontend/package.json /app/frontend/package.json
        COPY frontend/package-lock.json /app/frontend/package-lock.json
        RUN if [ -f package-lock.json ]; then npm ci; else npm install; fi

        COPY frontend /app/frontend
        RUN npm run build
      tags:
        - autoedit-frontend:local
    image: autoedit-frontend:local
    container_name: autoedit-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      NODE_ENV: production
    command:
      - /bin/sh
      - -lc
      - |
        npm run start
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - autoedit

networks:
  autoedit:
    driver: bridge

volumes:
  postgres_data:
  redis_data: