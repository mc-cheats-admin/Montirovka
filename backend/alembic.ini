# Alembic configuration for the AutoEdit backend.
#
# Notes:
# - The actual database URL is expected to be overridden in backend/alembic/env.py
#   from the project settings/environment, so the placeholder value below is
#   only a safe fallback for local manual use.
# - Paths are kept relative to this file and remain Windows-compatible.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Placeholder URL. The runtime project configuration should override this
# in alembic/env.py via settings.database_url.
sqlalchemy.url = postgresql+psycopg://autoedit:autoedit@localhost:5432/autoedit

# When generating revision files, use UTC-like sortable timestamps.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Keep revision locations simple for this project.
version_locations = alembic/versions

# Detect .pyc / __pycache__ etc.
sourceless = false

# Keep encoding explicit and predictable.
output_encoding = utf-8

# Allow revision environment execution.
revision_environment = false

[post_write_hooks]
# No automatic formatters are required here by default.
# Hooks can be added later if the environment guarantees their availability.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S